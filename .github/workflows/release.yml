name: Release

# Triggered only when a version tag is pushed to main.
# To release: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # required to create a GitHub Release

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: qxscan

jobs:
  # ── Build matrix ────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — static musl binary (runs on any Linux without glibc deps)
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: qxscan-linux-x86_64.tar.gz
            use_cross: true

          # macOS — Apple Silicon
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: qxscan-macos-arm64.tar.gz
            use_cross: false

          # macOS — Intel
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: qxscan-macos-x86_64.tar.gz
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # cross is a drop-in replacement for `cargo` that handles cross-compilation
      # and musl toolchains inside Docker — only installed when needed.
      - name: Install cross (Linux musl)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          tar czf "${{ matrix.archive }}" -C "$(dirname "$BINARY")" "${{ env.BINARY_NAME }}"

      - name: Compute checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ matrix.archive }}" >> SHA256SUMS.txt
          else
            shasum -a 256 "${{ matrix.archive }}" >> SHA256SUMS.txt
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            SHA256SUMS.txt
          retention-days: 1

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          cat artifacts/*/SHA256SUMS.txt | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Collect release assets
        run: |
          mkdir release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          cp SHA256SUMS.txt release-assets/

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Pull the section for this version between its header and the next
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" \
            CHANGELOG.md > release_notes.md
          # Fall back to a minimal note if the section is missing
          if [ ! -s release_notes.md ]; then
            echo "Release ${TAG}" > release_notes.md
          fi
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QXScan ${{ github.ref_name }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
