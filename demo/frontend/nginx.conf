worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # PQC-ready TLS 1.3 configuration
    # TLS 1.3 ciphers are built-in and not configurable via ssl_ciphers directive.
    # ssl_ciphers is only for TLS 1.2 and below, which is disabled here.
    ssl_protocols TLSv1.3;

    # PQC hybrid: X25519MLKEM768 is negotiated via key_share extension
    # This config exposes it when the client supports it
    ssl_ecdh_curve X25519:prime256v1:secp384r1;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS with preload (we're PQC-ready!)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-PQC-Enabled "true" always;

    server {
        listen      443 ssl http2;
        server_name frontend-pqc localhost;

        ssl_certificate     /certs/frontend-pqc.crt;
        ssl_certificate_key /certs/frontend-pqc.key;
        ssl_trusted_certificate /certs/ca.crt;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # Proxy to backend API
        location /api/ {
            proxy_pass https://backend:443/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
        }
    }
}
