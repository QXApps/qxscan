worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Legacy TLS 1.2 only — intentionally no PQC, no TLS 1.3
    ssl_protocols TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # No PQC curves — only NIST curves
    ssl_ecdh_curve prime256v1:secp384r1;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server {
        listen      443 ssl http2;
        server_name frontend-legacy localhost;

        ssl_certificate     /certs/frontend-legacy.crt;
        ssl_certificate_key /certs/frontend-legacy.key;
        ssl_trusted_certificate /certs/ca.crt;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
