worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # TLS 1.2 + 1.3 with PQC-ready curves
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # DNS resolver for upstream hostnames (Docker internal DNS)
    resolver 127.0.0.11 valid=10s;

    # Upstreams
    upstream frontend_pqc_cluster {
        server frontend-pqc:443 max_fails=3 fail_timeout=10s;
    }

    upstream frontend_legacy_cluster {
        server frontend-legacy:443 max_fails=3 fail_timeout=10s;
    }

    # ALB server — default route to PQC frontend
    server {
        listen      443 ssl http2;
        server_name alb localhost;

        ssl_certificate     /certs/alb.crt;
        ssl_certificate_key /certs/alb.key;
        ssl_trusted_certificate /certs/ca.crt;

        location / {
            proxy_pass https://frontend_pqc_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
        }

        # Route /legacy requests to the TLS 1.2 frontend
        location /legacy/ {
            proxy_pass https://frontend_legacy_cluster/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
        }
    }

    # Health check endpoint for ALB itself
    server {
        listen 8080;
        server_name localhost;
        location /health {
            return 200 "ALB healthy\n";
            add_header Content-Type text/plain;
        }
        location /routes {
            default_type application/json;
            return 200 '{"frontend_pqc":"https://frontend-pqc:443","frontend_legacy":"https://frontend-legacy:443","backend":"https://backend:443/api/"}';
        }
    }
}
